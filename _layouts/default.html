{%- capture bio -%}{% include bio.html %}{%- endcapture -%}
<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" type="image/svg+xml" href="{{ '/assets/favicon.svg' | relative_url }}" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Ubuntu:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <meta property="og:url" content="http://kianc.site">
    <meta property="og:type" content="website">
    <meta property="og:title" content="{{ site.title }}">
    <meta property="og:description" content="{{ bio | strip_newlines | strip }}">
    <meta property="og:image" content="http://kianc.site/assets/portrait.png">

    <link rel="stylesheet" href="{{ '/assets/styles.css' | relative_url }}">
    <title>{{ page.title }}</title>
  </head>

  <body>
    <div class="wrapper">
    <aside class="sidebar">
      <header>
        <h1><a href="{{ '/' | relative_url }}">{{ site.title }}</a></h1>
        <img class="portrait" src="{{ '/assets/portrait.png' | relative_url }}" alt="Portrait of Kian" />
        <p class="bio">{{ bio }}</p>
        <p class="contact-info">
          <span><i class="fa-solid fa-user"></i> he/him</span><br>
          <span><i class="fa-solid fa-location-dot"></i> pittsburgh</span><br>
          <span><i class="fa-brands fa-github"></i> <a href="https://github.com/toposes">toposes</a></span>
        </p>

        <hr>

        <nav>
          <a href="/math/">Research</a><br>
          <a href="/notes/">Writings</a>
        </nav>
      </header>
    </aside>

    <main id="swup" class="content">
      {{ content }}
    </main>
    </div>

    <!-- swup: client-side navigation so the sidebar (and portrait) never repaints -->
    <script src="{{ '/assets/js/swup.umd.js' | relative_url }}"></script>
    <script>
      new Swup();
    </script>
  </body>

</html>
